[models]
dialogue = "qwen3:14b"
decision = "qwen3:1.7b"
base_url = "http://127.0.0.1:11434"
request_timeout_seconds = 120.0
stream = true

[proactive]
enabled = true
decision_mode = "model-first"
min_assistant_cooldown_seconds = 18
min_proactive_cooldown_seconds = 28
question_cooldown_seconds = 75
max_consecutive_proactive_turns = 2
min_sleep_seconds = 8
max_sleep_seconds = 120
short_window_min_sleep_seconds = 6
short_window_max_sleep_seconds = 18
long_window_min_sleep_seconds = 30
long_window_max_sleep_seconds = 150
recent_reply_threshold_seconds = 35
duplicate_similarity_threshold = 0.92
user_disengagement_phrases = ["bye", "goodbye", "stop", "leave me alone", "thanks that's all", "不用了", "先这样", "再见"]

[cli]
refresh_hz = 4
max_visible_turns = 10
max_visible_events = 8
debug = true

[gui]
enabled = true
title = "Active Terminal Assistant"
width = 1280
height = 860
poll_interval_ms = 180
chat_font_size = 12
developer_panel_open = false

[logging]
level = "INFO"
